spring:
  application:
    name: ${APP_NAME:ZeroTrustAuth}
  profiles:
    active: ${APP_ENV:local}
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:zerotrust_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  flyway:
    enabled: false
    baseline-on-migrate: false

server:
  port: ${PORT:${APP_PORT:8080}}
  servlet:
    context-path: ${API_BASE_PATH:/}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET:8a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  issuer: ${JWT_ISSUER:ZeroTrustAuth}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:authorization,content-type,x-auth-token}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age: 3600

security:
  bcrypt-strength: ${BCRYPT_STRENGTH:10}
  login-max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
  login-lock-duration-minutes: ${LOGIN_LOCK_DURATION_MINUTES:15}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}
    requests: ${RATE_LIMIT_REQUESTS:100}
    duration-seconds: ${RATE_LIMIT_DURATION_SECONDS:60}

token:
  blacklist-prefix: ${ACCESS_TOKEN_BLACKLIST_PREFIX:jwt:blacklist:}
  refresh-hash-algorithm: ${REFRESH_TOKEN_HASH_ALGORITHM:SHA-256}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    enabled: ${SWAGGER_ENABLED:true}
  server:
    url: ${SWAGGER_SERVER_URL:${APP_BASE_URL:http://localhost:8080}}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.zerotrust.auth: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOG_LEVEL_ROOT:INFO}
  file:
    name: ${LOG_FILE_PATH:logs/app.log}
